name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to PlanetHoster
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Download build artifact from CI
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: build-dist
          path: dist/

      - name: Normalize remote directory
        id: normalize_dir
        shell: bash
        run: |
          target_dir="${{ secrets.FTP_TARGET_DIR }}"
          if [[ -z "$target_dir" ]]; then
            echo "FTP_TARGET_DIR secret is empty"
            exit 1
          fi
          if [[ "$target_dir" != */ ]]; then
            target_dir="${target_dir}/"
          fi
          echo "server_dir=$target_dir" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: dist/
          server-dir: ${{ steps.normalize_dir.outputs.server_dir }}
          dangerous-clean-slate: false
