name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to PlanetHoster
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Normalize remote directory
        id: normalize_dir
        shell: bash
        run: |
          target_dir="${{ secrets.FTP_TARGET_DIR }}"
          if [[ -z "$target_dir" ]]; then
            echo "FTP_TARGET_DIR secret is empty"
            exit 1
          fi
          if [[ "$target_dir" != */ ]]; then
            target_dir="${target_dir}/"
          fi
          echo "server_dir=$target_dir" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: dist/
          server-dir: ${{ steps.normalize_dir.outputs.server_dir }}
          dangerous-clean-slate: false
